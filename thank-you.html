<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent — Betuel S.A.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .thankyou {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-lg);
    }
    .thankyou__inner { max-width: 480px; }
    .thankyou__icon { font-size: 2.5rem; margin-bottom: var(--space-md); }
    .thankyou__title { font-size: 1.75rem; font-weight: 700; color: var(--text); margin-bottom: var(--space-sm); }
    .thankyou__body { color: var(--text-muted); margin-bottom: var(--space-lg); line-height: 1.75; }
  </style>
</head>
<body>
  <div class="thankyou">
    <div class="thankyou__inner">
      <div class="thankyou__icon">✓</div>
      <h1 class="thankyou__title">Message received</h1>
      <p class="thankyou__body">Thank you for reaching out. We'll get back to you within one business day.</p>
      <a href="/" class="btn btn--primary">Back to Betuel S.A.</a>
    </div>
  </div>
</body>
</html>
